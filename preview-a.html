<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Option A — Clipped Iframes</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Inter', sans-serif; }
    .carousel-track { scrollbar-width: none; -ms-overflow-style: none; }
    .carousel-track::-webkit-scrollbar { display: none; }
    .fade-bottom {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 80px;
      background: linear-gradient(to bottom, transparent, white);
      pointer-events: none;
      z-index: 10;
    }
  </style>
</head>
<body class="min-h-screen" style="background-image: radial-gradient(1100px circle at 12% -12%, rgba(184,240,237,0.55), transparent 55%), radial-gradient(900px circle at 92% 18%, rgba(255,237,184,0.28), transparent 60%), linear-gradient(180deg, rgba(244,252,251,0.95), rgba(255,250,236,0.78) 48%, rgba(255,255,255,1) 100%)">

  <div style="background:#1a1a2e;color:white;padding:12px 24px;text-align:center;font-size:13px;font-weight:700;letter-spacing:0.05em;">
    OPTION A — Clipped iframes with gradient fade + LinkedIn link
  </div>

  <section class="border-t border-neutral-200/50">
    <div class="mx-auto w-[88%] max-w-[950px] pt-4 pb-24">
      <div class="text-[11px] tracking-[0.28em] uppercase font-bold text-neutral-500/80">Insights</div>
      <h2 class="mt-4 text-3xl md:text-4xl font-bold tracking-tight text-neutral-950">
        <span class="bg-neutral-950 px-4 py-1 text-white shadow-xl ring-1 ring-white/10 inline-block">Latest from LinkedIn</span>
      </h2>

      <div class="mt-8 relative">
        <button onclick="document.getElementById('track-a').scrollBy({left:-424,behavior:'smooth'})" id="btn-l"
          class="absolute -left-5 top-1/2 -translate-y-1/2 z-20 h-10 w-10 rounded-full bg-white shadow-lg ring-1 ring-black/5 flex items-center justify-center opacity-0 transition-all" style="color:#afb975">
          <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
        </button>
        <button onclick="document.getElementById('track-a').scrollBy({left:424,behavior:'smooth'})" id="btn-r"
          class="absolute -right-5 top-1/2 -translate-y-1/2 z-20 h-10 w-10 rounded-full bg-white shadow-lg ring-1 ring-black/5 flex items-center justify-center transition-all" style="color:#afb975">
          <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
        </button>

        <div id="track-a" class="carousel-track flex gap-5 overflow-x-auto snap-x snap-mandatory pb-2">
          <!-- Each card: fixed height, clipped, gradient fade, LinkedIn CTA -->
          <div class="snap-start shrink-0 w-[320px] rounded-2xl bg-white ring-1 ring-black/5 shadow-sm overflow-hidden flex flex-col">
            <div class="relative" style="height:320px;overflow:hidden">
              <iframe src="https://www.linkedin.com/embed/feed/update/urn:li:activity:7447285866982445056" width="100%" height="600" frameborder="0" style="border:none;margin-top:-2px" title="Post 1"></iframe>
              <div class="fade-bottom"></div>
            </div>
            <a href="https://www.linkedin.com/feed/update/urn:li:activity:7447285866982445056" target="_blank"
              class="flex items-center justify-center gap-2 py-3 text-[11px] font-black uppercase tracking-widest border-t border-neutral-100 hover:bg-neutral-50 transition-colors" style="color:#afb975">
              <img src="https://haschemie.com/assets/linkedin-logo.png" class="h-4 w-auto" alt="" />
              View on LinkedIn
            </a>
          </div>

          <div class="snap-start shrink-0 w-[320px] rounded-2xl bg-white ring-1 ring-black/5 shadow-sm overflow-hidden flex flex-col">
            <div class="relative" style="height:320px;overflow:hidden">
              <iframe src="https://www.linkedin.com/embed/feed/update/urn:li:activity:7444818888808296448" width="100%" height="600" frameborder="0" style="border:none;margin-top:-2px" title="Post 2"></iframe>
              <div class="fade-bottom"></div>
            </div>
            <a href="https://www.linkedin.com/feed/update/urn:li:activity:7444818888808296448" target="_blank"
              class="flex items-center justify-center gap-2 py-3 text-[11px] font-black uppercase tracking-widest border-t border-neutral-100 hover:bg-neutral-50 transition-colors" style="color:#afb975">
              <img src="https://haschemie.com/assets/linkedin-logo.png" class="h-4 w-auto" alt="" />
              View on LinkedIn
            </a>
          </div>

          <div class="snap-start shrink-0 w-[320px] rounded-2xl bg-white ring-1 ring-black/5 shadow-sm overflow-hidden flex flex-col">
            <div class="relative" style="height:320px;overflow:hidden">
              <iframe src="https://www.linkedin.com/embed/feed/update/urn:li:activity:7444184565851713536" width="100%" height="600" frameborder="0" style="border:none;margin-top:-2px" title="Post 3"></iframe>
              <div class="fade-bottom"></div>
            </div>
            <a href="https://www.linkedin.com/feed/update/urn:li:activity:7444184565851713536" target="_blank"
              class="flex items-center justify-center gap-2 py-3 text-[11px] font-black uppercase tracking-widest border-t border-neutral-100 hover:bg-neutral-50 transition-colors" style="color:#afb975">
              <img src="https://haschemie.com/assets/linkedin-logo.png" class="h-4 w-auto" alt="" />
              View on LinkedIn
            </a>
          </div>

          <div class="snap-start shrink-0 w-[320px] rounded-2xl bg-white ring-1 ring-black/5 shadow-sm overflow-hidden flex flex-col">
            <div class="relative" style="height:320px;overflow:hidden">
              <iframe src="https://www.linkedin.com/embed/feed/update/urn:li:activity:7441624814752141312" width="100%" height="600" frameborder="0" style="border:none;margin-top:-2px" title="Post 4"></iframe>
              <div class="fade-bottom"></div>
            </div>
            <a href="https://www.linkedin.com/feed/update/urn:li:activity:7441624814752141312" target="_blank"
              class="flex items-center justify-center gap-2 py-3 text-[11px] font-black uppercase tracking-widest border-t border-neutral-100 hover:bg-neutral-50 transition-colors" style="color:#afb975">
              <img src="https://haschemie.com/assets/linkedin-logo.png" class="h-4 w-auto" alt="" />
              View on LinkedIn
            </a>
          </div>

          <div class="snap-start shrink-0 w-[320px] rounded-2xl bg-white ring-1 ring-black/5 shadow-sm overflow-hidden flex flex-col">
            <div class="relative" style="height:320px;overflow:hidden">
              <iframe src="https://www.linkedin.com/embed/feed/update/urn:li:activity:7440389396551401472" width="100%" height="600" frameborder="0" style="border:none;margin-top:-2px" title="Post 5"></iframe>
              <div class="fade-bottom"></div>
            </div>
            <a href="https://www.linkedin.com/feed/update/urn:li:activity:7440389396551401472" target="_blank"
              class="flex items-center justify-center gap-2 py-3 text-[11px] font-black uppercase tracking-widest border-t border-neutral-100 hover:bg-neutral-50 transition-colors" style="color:#afb975">
              <img src="https://haschemie.com/assets/linkedin-logo.png" class="h-4 w-auto" alt="" />
              View on LinkedIn
            </a>
          </div>
        </div>
      </div>
    </div>
  </section>

  <script>
    const track = document.getElementById('track-a');
    const btnL = document.getElementById('btn-l');
    const btnR = document.getElementById('btn-r');
    function update() {
      btnL.style.opacity = track.scrollLeft > 10 ? '1' : '0';
      btnR.style.opacity = track.scrollLeft < track.scrollWidth - track.clientWidth - 10 ? '1' : '0';
    }
    track.addEventListener('scroll', update);
    update();
  </script>
</body>
</html>
