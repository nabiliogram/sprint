<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <title>Sprint Assembly</title>
  <!-- Red and blue halves: fill the full canvas so the border paints over the outer ring cleanly -->
  <rect x="0" y="0" width="16" height="32" fill="#d4322d"/>
  <rect x="16" y="0" width="16" height="32" fill="#1a4fbf"/>
  <!-- Letters: S (red side) and A (blue side) -->
  <text x="11" y="22"
        text-anchor="middle"
        fill="#ffffff"
        font-family="'Archivo Black', 'Helvetica Neue', 'Arial Black', Arial, sans-serif"
        font-weight="900"
        font-size="16"
        font-stretch="condensed">S</text>
  <text x="21" y="22"
        text-anchor="middle"
        fill="#ffffff"
        font-family="'Archivo Black', 'Helvetica Neue', 'Arial Black', Arial, sans-serif"
        font-weight="900"
        font-size="16"
        font-stretch="condensed">A</text>
  <!-- 4px black border (2x the original 2px), drawn last so it sits on top -->
  <rect x="2" y="2" width="28" height="28" fill="none" stroke="#111111" stroke-width="4"/>
</svg>
