<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Option D — Featured + Thumbnails</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Inter', sans-serif; }
    .fade-bottom {
      position: absolute; bottom: 0; left: 0; right: 0; height: 60px;
      background: linear-gradient(to bottom, transparent, white);
      pointer-events: none; z-index: 10;
    }
    .thumb { cursor: pointer; transition: all 0.2s; }
    .thumb:hover { transform: translateX(3px); }
    .thumb.active { border-color: #afb975 !important; background: rgba(175,185,117,0.06); }
  </style>
</head>
<body class="min-h-screen" style="background-image: radial-gradient(1100px circle at 12% -12%, rgba(184,240,237,0.55), transparent 55%), radial-gradient(900px circle at 92% 18%, rgba(255,237,184,0.28), transparent 60%), linear-gradient(180deg, rgba(244,252,251,0.95), rgba(255,250,236,0.78) 48%, rgba(255,255,255,1) 100%)">

  <div style="background:#1a1a2e;color:white;padding:12px 24px;text-align:center;font-size:13px;font-weight:700;letter-spacing:0.05em;">
    OPTION D — Featured post + thumbnail list (magazine layout)
  </div>

  <section class="border-t border-neutral-200/50">
    <div class="mx-auto w-[88%] max-w-[950px] pt-4 pb-24">
      <div class="text-[11px] tracking-[0.28em] uppercase font-bold text-neutral-500/80">Insights</div>
      <h2 class="mt-4 text-3xl md:text-4xl font-bold tracking-tight text-neutral-950">
        <span class="bg-neutral-950 px-4 py-1 text-white shadow-xl ring-1 ring-white/10 inline-block">Latest from LinkedIn</span>
      </h2>

      <div class="mt-8 grid grid-cols-1 md:grid-cols-[1fr_280px] gap-6">

        <!-- Left: Featured post (full embed, contained) -->
        <div class="rounded-2xl bg-white ring-1 ring-black/5 shadow-sm overflow-hidden flex flex-col">
          <div class="relative flex-1" style="height:520px;overflow:hidden">
            <iframe id="featured-frame" src="https://www.linkedin.com/embed/feed/update/urn:li:activity:7447285866982445056"
              width="100%" height="700" frameborder="0" style="border:none" title="Featured post"></iframe>
          </div>
          <a id="featured-link" href="https://www.linkedin.com/feed/update/urn:li:activity:7447285866982445056" target="_blank"
            class="flex items-center justify-center gap-2 py-3.5 text-[11px] font-black uppercase tracking-widest border-t border-neutral-100 hover:bg-neutral-50 transition-colors" style="color:#afb975">
            <img src="https://haschemie.com/assets/linkedin-logo.png" class="h-4 w-auto" alt="" />
            View on LinkedIn
          </a>
        </div>

        <!-- Right: Thumbnail list -->
        <div class="flex flex-col gap-3">
          <div class="text-[10px] font-black uppercase tracking-[0.25em] text-neutral-400 mb-1">More posts</div>

          <div class="thumb active rounded-xl bg-white ring-1 border border-transparent ring-black/5 shadow-sm overflow-hidden flex flex-col"
            onclick="setFeatured('7447285866982445056', this)">
            <div class="relative" style="height:100px;overflow:hidden;pointer-events:none">
              <iframe src="https://www.linkedin.com/embed/feed/update/urn:li:activity:7447285866982445056" width="100%" height="300" frameborder="0" style="border:none;margin-top:-2px" title="t1"></iframe>
              <div class="fade-bottom" style="background:linear-gradient(to bottom,transparent,white)"></div>
            </div>
            <div class="px-3 py-2 flex items-center justify-between border-t border-neutral-100">
              <span class="text-[10px] font-bold text-neutral-400 uppercase tracking-wider">Mar 2025</span>
              <img src="https://haschemie.com/assets/linkedin-logo.png" class="h-3 w-auto opacity-40" alt="" />
            </div>
          </div>

          <div class="thumb rounded-xl bg-white ring-1 border border-transparent ring-black/5 shadow-sm overflow-hidden flex flex-col"
            onclick="setFeatured('7444818888808296448', this)">
            <div class="relative" style="height:100px;overflow:hidden;pointer-events:none">
              <iframe src="https://www.linkedin.com/embed/feed/update/urn:li:activity:7444818888808296448" width="100%" height="300" frameborder="0" style="border:none;margin-top:-2px" title="t2"></iframe>
              <div class="fade-bottom" style="background:linear-gradient(to bottom,transparent,white)"></div>
            </div>
            <div class="px-3 py-2 flex items-center justify-between border-t border-neutral-100">
              <span class="text-[10px] font-bold text-neutral-400 uppercase tracking-wider">Feb 2025</span>
              <img src="https://haschemie.com/assets/linkedin-logo.png" class="h-3 w-auto opacity-40" alt="" />
            </div>
          </div>

          <div class="thumb rounded-xl bg-white ring-1 border border-transparent ring-black/5 shadow-sm overflow-hidden flex flex-col"
            onclick="setFeatured('7444184565851713536', this)">
            <div class="relative" style="height:100px;overflow:hidden;pointer-events:none">
              <iframe src="https://www.linkedin.com/embed/feed/update/urn:li:activity:7444184565851713536" width="100%" height="300" frameborder="0" style="border:none;margin-top:-2px" title="t3"></iframe>
              <div class="fade-bottom" style="background:linear-gradient(to bottom,transparent,white)"></div>
            </div>
            <div class="px-3 py-2 flex items-center justify-between border-t border-neutral-100">
              <span class="text-[10px] font-bold text-neutral-400 uppercase tracking-wider">Feb 2025</span>
              <img src="https://haschemie.com/assets/linkedin-logo.png" class="h-3 w-auto opacity-40" alt="" />
            </div>
          </div>

          <div class="thumb rounded-xl bg-white ring-1 border border-transparent ring-black/5 shadow-sm overflow-hidden flex flex-col"
            onclick="setFeatured('7441624814752141312', this)">
            <div class="relative" style="height:100px;overflow:hidden;pointer-events:none">
              <iframe src="https://www.linkedin.com/embed/feed/update/urn:li:activity:7441624814752141312" width="100%" height="300" frameborder="0" style="border:none;margin-top:-2px" title="t4"></iframe>
              <div class="fade-bottom" style="background:linear-gradient(to bottom,transparent,white)"></div>
            </div>
            <div class="px-3 py-2 flex items-center justify-between border-t border-neutral-100">
              <span class="text-[10px] font-bold text-neutral-400 uppercase tracking-wider">Jan 2025</span>
              <img src="https://haschemie.com/assets/linkedin-logo.png" class="h-3 w-auto opacity-40" alt="" />
            </div>
          </div>

        </div>
      </div>
    </div>
  </section>

  <script>
    function setFeatured(id, el) {
      document.getElementById('featured-frame').src = `https://www.linkedin.com/embed/feed/update/urn:li:activity:${id}`;
      document.getElementById('featured-link').href = `https://www.linkedin.com/feed/update/urn:li:activity:${id}`;
      document.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
    }
  </script>
</body>
</html>
